<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <!-- Building envelope -->
  <rect x="10" y="10" width="880" height="580" fill="#f8f8f8" stroke="#333" stroke-width="3" rx="2"/>

  <!-- Common area: main hallway (horizontal corridor) -->
  <polygon
    data-space-id="hallway_main"
    data-type="common_area"
    points="10,280 890,280 890,320 10,320"
    fill="#e8e8e8"
    stroke="#bbb"
    stroke-width="1"
  />

  <!-- Common area: entrance lobby -->
  <polygon
    data-space-id="lobby_main"
    data-type="common_area"
    points="380,10 520,10 520,100 380,100"
    fill="#e8e8e8"
    stroke="#bbb"
    stroke-width="1"
  />

  <!-- Shop: Laser Shop (top-left zone) -->
  <polygon
    data-space-id="LASER"
    data-type="shop"
    points="10,10 200,10 200,280 10,280"
    fill="#dbeafe"
    stroke="#93c5fd"
    stroke-width="1.5"
    class="space-interactive"
  />
  <text x="105" y="155" text-anchor="middle" font-size="11" fill="#1e40af" font-family="sans-serif">Laser Shop</text>

  <!-- Shop: Woodshop (top-right zone) -->
  <polygon
    data-space-id="WOODSHOP"
    data-type="shop"
    points="700,10 890,10 890,280 700,280"
    fill="#dbeafe"
    stroke="#93c5fd"
    stroke-width="1.5"
    class="space-interactive"
  />
  <text x="795" y="155" text-anchor="middle" font-size="11" fill="#1e40af" font-family="sans-serif">Woodshop</text>

  <!-- Studio units: upper row (6 units across middle) -->
  <!-- s50-l blocks: 80px wide × 60px tall -->
  <rect data-space-id="s50-l:220:20"  data-type="studio_unit" x="220" y="20"  width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:300:20"  data-type="studio_unit" x="300" y="20"  width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:380:20"  data-type="studio_unit" x="380" y="20"  width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:460:20"  data-type="studio_unit" x="460" y="20"  width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:540:20"  data-type="studio_unit" x="540" y="20"  width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:620:20"  data-type="studio_unit" x="620" y="20"  width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>

  <!-- Studio units: second row -->
  <rect data-space-id="s50-l:220:80"  data-type="studio_unit" x="220" y="80"  width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:300:80"  data-type="studio_unit" x="300" y="80"  width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <!-- 380-460 is lobby -->
  <rect data-space-id="s50-l:460:80"  data-type="studio_unit" x="460" y="80"  width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:540:80"  data-type="studio_unit" x="540" y="80"  width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:620:80"  data-type="studio_unit" x="620" y="80"  width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>

  <!-- Studio units: third row -->
  <rect data-space-id="s50-l:220:140" data-type="studio_unit" x="220" y="140" width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:300:140" data-type="studio_unit" x="300" y="140" width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:380:140" data-type="studio_unit" x="380" y="140" width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:460:140" data-type="studio_unit" x="460" y="140" width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:540:140" data-type="studio_unit" x="540" y="140" width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:620:140" data-type="studio_unit" x="620" y="140" width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>

  <!-- Studio units: fourth row -->
  <rect data-space-id="s50-l:220:200" data-type="studio_unit" x="220" y="200" width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:300:200" data-type="studio_unit" x="300" y="200" width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:380:200" data-type="studio_unit" x="380" y="200" width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:460:200" data-type="studio_unit" x="460" y="200" width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:540:200" data-type="studio_unit" x="540" y="200" width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="s50-l:620:200" data-type="studio_unit" x="620" y="200" width="78" height="58" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="1" class="space-interactive"/>

  <!-- Lower half: shops and storage -->
  <!-- Shop: Metal Shop (bottom-left) -->
  <polygon
    data-space-id="METALSHOP"
    data-type="shop"
    points="10,320 300,320 300,590 10,590"
    fill="#dbeafe"
    stroke="#93c5fd"
    stroke-width="1.5"
    class="space-interactive"
  />
  <text x="155" y="460" text-anchor="middle" font-size="11" fill="#1e40af" font-family="sans-serif">Metal Shop</text>

  <!-- Shop: CNC Shop (bottom-middle) -->
  <polygon
    data-space-id="CNC"
    data-type="shop"
    points="300,320 600,320 600,590 300,590"
    fill="#dbeafe"
    stroke="#93c5fd"
    stroke-width="1.5"
    class="space-interactive"
  />
  <text x="450" y="460" text-anchor="middle" font-size="11" fill="#1e40af" font-family="sans-serif">CNC Shop</text>

  <!-- Storage area (bottom-right) -->
  <rect data-space-id="stor-pal:640:340" data-type="storage_unit" x="620" y="330" width="50" height="50" fill="#fde8d8" stroke="#fdba74" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="stor-pal:700:340" data-type="storage_unit" x="680" y="330" width="50" height="50" fill="#fde8d8" stroke="#fdba74" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="stor-pal:760:340" data-type="storage_unit" x="740" y="330" width="50" height="50" fill="#fde8d8" stroke="#fdba74" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="stor-pal:820:340" data-type="storage_unit" x="800" y="330" width="50" height="50" fill="#fde8d8" stroke="#fdba74" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="stor-pal:640:400" data-type="storage_unit" x="620" y="400" width="50" height="50" fill="#fde8d8" stroke="#fdba74" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="stor-pal:700:400" data-type="storage_unit" x="680" y="400" width="50" height="50" fill="#fde8d8" stroke="#fdba74" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="stor-pal:760:400" data-type="storage_unit" x="740" y="400" width="50" height="50" fill="#fde8d8" stroke="#fdba74" stroke-width="1.5" rx="1" class="space-interactive"/>
  <rect data-space-id="stor-pal:820:400" data-type="storage_unit" x="800" y="400" width="50" height="50" fill="#fde8d8" stroke="#fdba74" stroke-width="1.5" rx="1" class="space-interactive"/>

  <!-- Shelf bays (level 1) -->
  <g id="shelf_l1">
    <rect data-space-id="shelf-std:640:470:l1" data-type="storage_unit" data-level="1" x="620" y="470" width="30" height="80" fill="#fed7aa" stroke="#fb923c" stroke-width="1" rx="1" class="space-interactive"/>
    <rect data-space-id="shelf-std:680:470:l1" data-type="storage_unit" data-level="1" x="660" y="470" width="30" height="80" fill="#fed7aa" stroke="#fb923c" stroke-width="1" rx="1" class="space-interactive"/>
    <rect data-space-id="shelf-std:720:470:l1" data-type="storage_unit" data-level="1" x="700" y="470" width="30" height="80" fill="#fed7aa" stroke="#fb923c" stroke-width="1" rx="1" class="space-interactive"/>
    <rect data-space-id="shelf-std:760:470:l1" data-type="storage_unit" data-level="1" x="740" y="470" width="30" height="80" fill="#fed7aa" stroke="#fb923c" stroke-width="1" rx="1" class="space-interactive"/>
    <rect data-space-id="shelf-std:800:470:l1" data-type="storage_unit" data-level="1" x="780" y="470" width="30" height="80" fill="#fed7aa" stroke="#fb923c" stroke-width="1" rx="1" class="space-interactive"/>
    <rect data-space-id="shelf-std:840:470:l1" data-type="storage_unit" data-level="1" x="820" y="470" width="30" height="80" fill="#fed7aa" stroke="#fb923c" stroke-width="1" rx="1" class="space-interactive"/>
  </g>
  <!-- Shelf bays (level 2) - same positions, different data-space-id -->
  <g id="shelf_l2">
    <rect data-space-id="shelf-std:640:470:l2" data-type="storage_unit" data-level="2" x="620" y="470" width="30" height="80" fill="#fed7aa" stroke="#fb923c" stroke-width="1" rx="1" class="space-interactive" style="display:none"/>
    <rect data-space-id="shelf-std:680:470:l2" data-type="storage_unit" data-level="2" x="660" y="470" width="30" height="80" fill="#fed7aa" stroke="#fb923c" stroke-width="1" rx="1" class="space-interactive" style="display:none"/>
    <rect data-space-id="shelf-std:720:470:l2" data-type="storage_unit" data-level="2" x="700" y="470" width="30" height="80" fill="#fed7aa" stroke="#fb923c" stroke-width="1" rx="1" class="space-interactive" style="display:none"/>
    <rect data-space-id="shelf-std:760:470:l2" data-type="storage_unit" data-level="2" x="740" y="470" width="30" height="80" fill="#fed7aa" stroke="#fb923c" stroke-width="1" rx="1" class="space-interactive" style="display:none"/>
    <rect data-space-id="shelf-std:800:470:l2" data-type="storage_unit" data-level="2" x="780" y="470" width="30" height="80" fill="#fed7aa" stroke="#fb923c" stroke-width="1" rx="1" class="space-interactive" style="display:none"/>
    <rect data-space-id="shelf-std:840:470:l2" data-type="storage_unit" data-level="2" x="820" y="470" width="30" height="80" fill="#fed7aa" stroke="#fb923c" stroke-width="1" rx="1" class="space-interactive" style="display:none"/>
  </g>

  <!-- Labels for storage area -->
  <text x="730" y="325" text-anchor="middle" font-size="10" fill="#9a3412" font-family="sans-serif">Pallets</text>
  <text x="730" y="465" text-anchor="middle" font-size="10" fill="#9a3412" font-family="sans-serif">Shelves</text>
</svg>
